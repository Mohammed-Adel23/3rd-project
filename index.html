<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"

    <link rel="stylesheet" href="3rd-project.css" />
    <title>order summary</title>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <img src="icons/illustration-hero.svg" />
      </div>
      <div class="discr">
        <div class="order">Order Summary</div>
        <div class="message">
          You Can Now listen to millions of songs audiobook and prodcasts on any
          device anywhere you like!
        </div>
      </div>
      <div class="Plan">
        <div><img class="icon-music" src="icons/icon-music.svg" /></div>
        <div class="annual">
          Annual Plan <span class="price"><br />$59.99/year</span>
        </div>
        <div class="change">Change</div>
      </div>
      <div class="buttons">
        <div><button class="pay-button">Proceed to Payment</button></div>
        <div><button class="cancel">Cancel Order</button></div>
      </div>
    </div>
  </body>
